<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Inteligente EBD - Aulas</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
            --success: #27ae60;
            --pending: #95a5a6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        p.subtitle { margin-top: 8px; color: #bdc3c7; font-size: 0.95rem; }

        /* Controles de Filtro e Busca */
        .controls-container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: -20px auto 30px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .search-box {
            flex: 1 1 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        .search-box input:focus { border-color: var(--accent); }

        .filters {
            display: flex;
            gap: 10px;
            flex: 1 1 200px;
        }

        .filters select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
            background-color: white;
            cursor: pointer;
        }

        /* Grid de Aulas */
        .grid-aulas {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        .card-aula {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border-left: 6px solid transparent;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-aula:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-aula.disponivel { border-left-color: var(--success); }
        .card-aula.pendente { border-left-color: var(--pending); opacity: 0.8; pointer-events: none; }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
            width: fit-content;
            margin-bottom: 15px;
        }

        .disponivel .status-badge { background: #e8f5e9; color: var(--success); }
        .pendente .status-badge { background: #f4f4f4; color: var(--pending); }

        .aula-data { font-size: 0.85rem; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; }
        .aula-titulo { font-size: 1.15rem; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        .aula-tema { font-size: 0.95rem; color: #555; line-height: 1.4; margin-bottom: 15px; flex-grow: 1; }
        .aula-link { font-size: 0.75rem; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; word-break: break-all; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .controls-container { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; }
        }
        
        /* --- MODAL PADRÃO OURO --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg); padding: 25px 30px; border-radius: 12px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(-20px); transition: transform 0.3s ease;
            max-width: 400px; width: 90%;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-btn {
            margin-top: 20px; padding: 10px 25px; background: var(--accent); color: white; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .modal-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

    <header>
        <h1>Acervo de Aulas - EBD</h1>
        <p class="subtitle">ADSA Brasil - Embu Guaçu</p>
    </header>

    <div class="controls-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por tema, livro ou data..." oninput="filtrarAulas()">
        </div>
        <div class="filters">
            <select id="monthSelect" onchange="filtrarAulas()">
                <option value="all">Todos os Meses</option>
                <option value="01">Janeiro</option>
                <option value="02">Fevereiro</option>
                <option value="03">Março</option>
                <option value="04">Abril</option>
                <option value="05">Maio</option>
                <option value="06">Junho</option>
                <option value="07">Julho</option>
                <option value="08">Agosto</option>
                <option value="09">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
            <select id="yearSelect" onchange="filtrarAulas()">
                <option value="all">Todos os Anos</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
    </div>

    <div class="grid-aulas" id="gridAulas">
        <!-- Aulas geradas pelo JavaScript -->
    </div>
    <!-- Modal de Feedback (Optimistic UI) -->
    <div id="feedbackModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0; color: var(--primary);">Atenção</h3>
            <p id="modalMessage" style="color: #555; line-height: 1.4;"></p>
            <button class="modal-btn" onclick="fecharModal()">Entendi</button>
        </div>
    </div>
<script>
        // --- SISTEMA DE FEEDBACK (MODAL) ---
        function mostrarModal(titulo, mensagem) {
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalMessage').innerText = mensagem;
            document.getElementById('feedbackModal').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('feedbackModal').classList.remove('active');
        }

        // --- SCANNER AUTOMÁTICO DE DIRETÓRIO ---
        async function scanDiretorio() {
            const grid = document.getElementById('gridAulas');
            const mesSelecionado = document.getElementById('monthSelect').value;
            const anoSelecionado = document.getElementById('yearSelect').value;

            if (mesSelecionado === 'all' || anoSelecionado === 'all') {
                mostrarModal('Filtro Necessário', 'Para evitar sobrecarga no servidor, por favor, selecione um Mês e um Ano específicos para a busca.');
                grid.innerHTML = '';
                return;
            }

            // Optimistic UI: Mostra o status de carregamento antes da resposta do servidor
            grid.innerHTML = '<div class="no-results">🔍 Escaneando servidor... Procurando aulas publicadas em ' + mesSelecionado + '/' + anoSelecionado + '</div>';

            const diasNoMes = new Date(anoSelecionado, parseInt(mesSelecionado), 0).getDate();
            let aulasEncontradas = [];
            const promessas = [];

            // Dispara 31 requisições simultâneas silenciosas para encontrar os arquivos
            for (let dia = 1; dia <= diasNoMes; dia++) {
                const diaFormatado = String(dia).padStart(2, '0');
                const nomeArquivo = `aula${diaFormatado}${mesSelecionado}${anoSelecionado}.html`;

                // Faz um FETCH local para ver se o arquivo HTML existe
                promessas.push(
                    fetch(nomeArquivo, { method: 'GET' })
                    .then(async response => {
                        if (response.ok) {
                            const htmlText = await response.text();
                            
                            // Analisador Inteligente: Lê o arquivo HTML oculto e extrai as informações
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlText, 'text/html');

                            let titulo = "Estudo EBD";
                            let tema = "Tema Indisponível";

                            // Puxa as informações baseadas na estrutura HTML da sua aula
                            const h2 = doc.querySelector('.header-box h2');
                            const small = doc.querySelector('.header-box small');

                            if (h2) titulo = h2.innerText;
                            if (small) tema = small.innerText;

                            aulasEncontradas.push({
                                data: `${diaFormatado}/${mesSelecionado}/${anoSelecionado}`,
                                arquivo: nomeArquivo,
                                titulo: titulo,
                                tema: tema
                            });
                        }
                    })
                    .catch(() => { /* Arquivo não existe no GitHub (Erro 404 normal, é ignorado silenciosamente) */ })
                );
            }

            // Aguarda todas as verificações terminarem
            await Promise.all(promessas);

            // Renderiza o resultado na tela
            grid.innerHTML = '';

            if (aulasEncontradas.length === 0) {
                grid.innerHTML = `<div class="no-results">Nenhum arquivo de aula encontrado no servidor para ${mesSelecionado}/${anoSelecionado}.<br><small>Certifique-se de que o arquivo "aulaDDMMAAAA.html" foi feito o upload no GitHub.</small></div>`;
                return;
            }

            // Ordena as aulas encontradas pela data
            aulasEncontradas.sort((a, b) => a.data.localeCompare(b.data));

            aulasEncontradas.forEach(aula => {
                const card = document.createElement('a');
                card.href = aula.arquivo;
                card.className = `card-aula disponivel`;
                // Guarda os dados no atributo para o campo de busca de texto
                card.setAttribute('data-search', `${aula.titulo} ${aula.tema} ${aula.data}`.toLowerCase());

                card.innerHTML = `
                    <div class="status-badge">🟢 Publicada</div>
                    <div class="aula-data">📅 ${aula.data}</div>
                    <div class="aula-titulo">${aula.titulo}</div>
                    <div class="aula-tema">${aula.tema}</div>
                    <div class="aula-link">Arquivo fonte: ${aula.arquivo}</div>
                `;
                grid.appendChild(card);
            });

            // Caso o usuário já tenha algo digitado na busca, filtra o resultado recém-chegado
            filtrarTexto();
        }

        // --- FILTRO DE TEXTO EM TEMPO REAL ---
        function filtrarTexto() {
            const termoBusca = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card-aula');

            cards.forEach(card => {
                const content = card.getAttribute('data-search');
                card.style.display = content.includes(termoBusca) ? "flex" : "none";
            });
        }

        // --- INICIALIZAÇÃO INTELIGENTE ---
        function configurarPainel() {
            const dataAtual = new Date();
            const mesAtual = String(dataAtual.getMonth() + 1).padStart(2, '0');
            const anoAtual = String(dataAtual.getFullYear());

            document.getElementById('monthSelect').value = mesAtual;
            const yearSelect = document.getElementById('yearSelect');
            if ([...yearSelect.options].some(opt => opt.value === anoAtual)) {
                yearSelect.value = anoAtual;
            }

            // Associa os gatilhos corretamente
            document.getElementById('monthSelect').onchange = scanDiretorio;
            document.getElementById('yearSelect').onchange = scanDiretorio;
            document.getElementById('searchInput').oninput = filtrarTexto;

            // Inicia o scan do mês atual automaticamente
            scanDiretorio();
        }

        window.onload = configurarPainel;

    </script>
</body>
</html>
