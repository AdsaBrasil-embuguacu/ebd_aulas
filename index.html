<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1" />
  <title>Portal do Professor — EBD Ezequiel</title>
  <style>
    :root {
      --bg-dark: #1e272e;
      --panel: #2f3640;
      --accent: #fbc531;
      --btn: #00a8ff;
      --success: #27ae60;
      --text: #ecf0f1;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background: var(--panel);
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      box-sizing: border-box;
    }

    h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
    p.subtitle { color: #cbd5e1; margin-top: 5px; font-size: 0.9rem; }

    .search-container {
      width: 90%;
      max-width: 600px;
      margin: 30px 0;
      position: relative;
    }

    #classSearch {
      width: 100%;
      padding: 15px 20px;
      border-radius: 30px;
      border: none;
      background: #fff;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      outline: none;
      color: #333;
    }

    .grid-aulas {
      width: 90%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding-bottom: 50px;
    }

    .card-aula {
      background: var(--panel);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.3s ease, border-color 0.3s ease;
      border: 2px solid transparent;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
    }

    .card-aula:hover {
      transform: translateY(-5px);
      border-color: var(--btn);
      background: #353b48;
    }

    .status-badge {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: bold;
      width: fit-content;
      margin-bottom: 10px;
    }

    .pronta { background: var(--success); color: white; }
    .agendada { background: #718093; color: white; }

    .aula-titulo { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; color: var(--accent); }
    .aula-tema { font-size: 0.95rem; margin-bottom: 10px; line-height: 1.4; color: #f5f6fa; }
    .aula-data { color: var(--btn); font-weight: bold; font-size: 0.9rem; }
    .aula-link { font-size: 0.75rem; color: #95a5a6; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

    footer {
      padding: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #718093;
    }

    @media (max-width: 600px) {
      .grid-aulas { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Painel do Professor EBD</h1>
    <p class="subtitle">Estudos em Ezequiel — Comentários: José Carlos dos Santos e Pádua Rodrigues</p>
  </header>

  <div class="search-container">
    <input type="text" id="classSearch" placeholder="Pesquisar lição, tema ou data..." onkeyup="filterClasses()">
  </div>

  <div class="grid-aulas" id="gridAulas">
    </div>

  <footer>
    © 2026 ADSA Brasil - Embu Guaçu
  </footer>

  <script>
    const aulas = [
      { id: "01", tema: "O livro de Ezequiel e sua visão inaugural.", ref: "Ezequiel 1", data: "05/01/26", file: "aula050126.html", pronta: true },
      { id: "02", tema: "O chamado de Ezequiel.", ref: "Ezequiel 2 e 3", data: "12/01/26", file: "aula120126.html", pronta: true },
      { id: "03", tema: "O fim vem sobre Jerusalém e Israel.", ref: "Ezequiel 7", data: "19/01/26", file: "aula190126.html", pronta: true },
      { id: "04", tema: "A glória de Deus se retira do templo.", ref: "Ezequiel 8 a 11", data: "26/01/26", file: "aula260126.html", pronta: true },
      { id: "05", tema: "A profecia verdadeira e as falsas profecias.", ref: "Ezequiel 12 e 13", data: "01/02/26", file: "aula010226.html", pronta: true },
      { id: "06", tema: "Noé, Daniel e Jó não substituem você.", ref: "Ezequiel 14", data: "08/02/26", file: "ebd_aulas/aula080226.html", pronta: true },
      { id: "07", tema: "A alma que pecar, essa morrerá.", ref: "Ezequiel 18", data: "15/02/26", file: "ebd_aulas/ula150226.html", pronta: false },
      { id: "08", tema: "A queda do querubim ungido.", ref: "Ezequiel 28", data: "22/02/26", file: "ebd_aulas/aula220226.html", pronta: false },
      { id: "09", tema: "O divino pastor.", ref: "Ezequiel 34", data: "01/03/26", file: "ebd_aulas/aula010326.html", pronta: false },
      { id: "10", tema: "O vale dos ossos secos.", ref: "Ezequiel 37", data: "08/03/26", file: "ebd_aulas/aula080326.html", pronta: false },
      { id: "11", tema: "A batalha escatológica.", ref: "Ezequiel 38 e 39", data: "16/03/26", file: "ebd_aulas/aula150326.html", pronta: false },
      { id: "12", tema: "A glória do Senhor voltando para o templo.", ref: "Ezequiel 40 a 46", data: "22/03/26", file: "ebd_aulas/aula220326.html", pronta: false },
      { id: "13", tema: "O rio da vida e a nova cidade 'O Senhor está ali'.", ref: "Ezequiel 47 e 48", data: "29/03/26", file: "ebd_aulas/aula290326.html", pronta: false }
    ];

    const baseUrl = "https://adsabrasil-embuguacu.github.io/";

    function renderAulas() {
      const grid = document.getElementById('gridAulas');
      grid.innerHTML = "";

      aulas.forEach(aula => {
        const linkCompleto = baseUrl + aula.file;
        const card = document.createElement('a');
        card.href = linkCompleto;
        card.className = 'card-aula';
        card.setAttribute('data-search', `estudo ${aula.id} ${aula.tema} ${aula.ref} ${aula.data}`.toLowerCase());

        card.innerHTML = `
          <div>
            <span class="status-badge ${aula.pronta ? 'pronta' : 'agendada'}">
              ${aula.pronta ? '● Disponível' : '○ Aguardando'}
            </span>
            <div class="aula-titulo">ESTUDO ${aula.id} | ${aula.ref}</div>
            <div class="aula-tema">${aula.tema}</div>
            <div class="aula-data">📅 ${aula.data}</div>
          </div>
          <div class="aula-link">Link: ${aula.file}</div>
        `;
        grid.appendChild(card);
      });
    }

    function filterClasses() {
      const input = document.getElementById('classSearch').value.toLowerCase();
      const cards = document.getElementsByClassName('card-aula');

      for (let i = 0; i < cards.length; i++) {
        const content = cards[i].getAttribute('data-search');
        if (content.includes(input)) {
          cards[i].style.display = "flex";
        } else {
          cards[i].style.display = "none";
        }
      }
    }

    renderAulas();
  </script>
</body>
</html>
