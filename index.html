<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Inteligente EBD - Aulas</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
            --success: #27ae60;
            --pending: #95a5a6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        p.subtitle { margin-top: 8px; color: #bdc3c7; font-size: 0.95rem; }

        /* Controles de Filtro e Busca */
        .controls-container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: -20px auto 30px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .search-box {
            flex: 1 1 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        .search-box input:focus { border-color: var(--accent); }

        .filters {
            display: flex;
            gap: 10px;
            flex: 1 1 200px;
        }

        .filters select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
            background-color: white;
            cursor: pointer;
        }

        /* Grid de Aulas */
        .grid-aulas {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        .card-aula {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border-left: 6px solid transparent;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-aula:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-aula.disponivel { border-left-color: var(--success); }
        .card-aula.pendente { border-left-color: var(--pending); opacity: 0.8; pointer-events: none; }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
            width: fit-content;
            margin-bottom: 15px;
        }

        .disponivel .status-badge { background: #e8f5e9; color: var(--success); }
        .pendente .status-badge { background: #f4f4f4; color: var(--pending); }

        .aula-data { font-size: 0.85rem; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; }
        .aula-titulo { font-size: 1.15rem; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        .aula-tema { font-size: 0.95rem; color: #555; line-height: 1.4; margin-bottom: 15px; flex-grow: 1; }
        .aula-link { font-size: 0.75rem; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; word-break: break-all; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .controls-container { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Acervo de Aulas - EBD</h1>
        <p class="subtitle">ADSA Brasil - Embu Guaçu</p>
    </header>

    <div class="controls-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por tema, livro ou data..." oninput="filtrarAulas()">
        </div>
        <div class="filters">
            <select id="monthSelect" onchange="filtrarAulas()">
                <option value="all">Todos os Meses</option>
                <option value="01">Janeiro</option>
                <option value="02">Fevereiro</option>
                <option value="03">Março</option>
                <option value="04">Abril</option>
                <option value="05">Maio</option>
                <option value="06">Junho</option>
                <option value="07">Julho</option>
                <option value="08">Agosto</option>
                <option value="09">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
            <select id="yearSelect" onchange="filtrarAulas()">
                <option value="all">Todos os Anos</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
    </div>

    <div class="grid-aulas" id="gridAulas">
        <!-- Aulas geradas pelo JavaScript -->
    </div>

    <script>
        // 1. BASE DE DADOS DAS AULAS
        // Para adicionar uma aula nova, basta colocar aqui.
        // O sistema gera o link automaticamente no padrão aulaDDMMAAAA.html
        const cronograma = [
            // Aulas de Maio de 2026 (Período Atual como Exemplo)
            { id: "01", livro: "1 Timóteo 1", tema: "A Missão do Pastor Timóteo", data: "03/05/2026", disponivel: true },
            { id: "02", livro: "1 Timóteo 2", tema: "A Oração e o Comportamento", data: "10/05/2026", disponivel: true },
            { id: "03", livro: "1 Timóteo 3", tema: "A Igreja, seus Pastores e Diáconos", data: "17/05/2026", disponivel: true },
            { id: "04", livro: "1 Timóteo 4", tema: "Alerta contra a Apostasia", data: "24/05/2026", disponivel: false },
            { id: "05", livro: "1 Timóteo 5", tema: "Cuidando Bem das Diferentes Gerações", data: "31/05/2026", disponivel: false },
            
            // Aulas Anteriores (Exemplo Abril)
            { id: "13", livro: "Ezequiel 47", tema: "O rio da vida", data: "26/04/2026", disponivel: true },
            { id: "12", livro: "Ezequiel 40", tema: "A glória do Senhor voltando", data: "19/04/2026", disponivel: true }
        ];

        // 2. FUNÇÃO PARA GERAR O NOME DO ARQUIVO (aulaDDMMAAAA.html)
        function gerarNomeArquivo(dataString) {
            // Pega "03/05/2026" e transforma em "aula03052026.html"
            const partes = dataString.split('/');
            return `aula${partes[0]}${partes[1]}${partes[2]}.html`;
        }

        // 3. INICIALIZAÇÃO INTELIGENTE (Pega a data atual do usuário)
        function configurarFiltroInicial() {
            const dataAtual = new Date();
            // getMonth() retorna de 0 a 11. Somamos 1 e formatamos com zero à esquerda (ex: "05")
            const mesAtual = String(dataAtual.getMonth() + 1).padStart(2, '0');
            const anoAtual = String(dataAtual.getFullYear());

            document.getElementById('monthSelect').value = mesAtual;
            
            // Verifica se o ano atual existe no select, senão deixa em "all"
            const yearSelect = document.getElementById('yearSelect');
            if ([...yearSelect.options].some(opt => opt.value === anoAtual)) {
                yearSelect.value = anoAtual;
            }

            filtrarAulas();
        }

        // 4. LÓGICA DE FILTRAGEM E RENDERIZAÇÃO
        function filtrarAulas() {
            const termoBusca = document.getElementById('searchInput').value.toLowerCase();
            const mesSelecionado = document.getElementById('monthSelect').value;
            const anoSelecionado = document.getElementById('yearSelect').value;

            const grid = document.getElementById('gridAulas');
            grid.innerHTML = ""; // Limpa a tela

            // Filtra o array
            const aulasFiltradas = cronograma.filter(aula => {
                const partesData = aula.data.split('/'); // [DD, MM, AAAA]
                const mesAula = partesData[1];
                const anoAula = partesData[2];

                // Regras de filtro
                const bateBusca = aula.tema.toLowerCase().includes(termoBusca) || 
                                  aula.livro.toLowerCase().includes(termoBusca) || 
                                  aula.data.includes(termoBusca);
                
                const bateMes = mesSelecionado === 'all' || mesSelecionado === mesAula;
                const bateAno = anoSelecionado === 'all' || anoSelecionado === anoAula;

                return bateBusca && bateMes && bateAno;
            });

            // Ordena por data (opcional, aqui mantemos a ordem do array)
            
            // Renderiza na tela
            if (aulasFiltradas.length === 0) {
                grid.innerHTML = `<div class="no-results">Nenhuma aula encontrada para este período ou busca.</div>`;
                return;
            }

            aulasFiltradas.forEach(aula => {
                const nomeArquivo = gerarNomeArquivo(aula.data);
                const baseUrl = window.location.pathname.includes('ebd_aulas') ? '' : 'ebd_aulas/';
                const linkFinal = aula.disponivel ? `${baseUrl}${nomeArquivo}` : '#';
                
                const classeStatus = aula.disponivel ? 'disponivel' : 'pendente';
                const textoStatus = aula.disponivel ? '🟢 Disponível' : '⏳ Em Breve';

                const card = document.createElement('a');
                card.href = linkFinal;
                card.className = `card-aula ${classeStatus}`;

                card.innerHTML = `
                    <div class="status-badge">${textoStatus}</div>
                    <div class="aula-data">📅 ${aula.data}</div>
                    <div class="aula-titulo">Estudo ${aula.id} | ${aula.livro}</div>
                    <div class="aula-tema">${aula.tema}</div>
                    <div class="aula-link">Arquivo: ${nomeArquivo}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Inicia o painel rodando as funções
        window.onload = configurarFiltroInicial;

    </script>
</body>
</html>
